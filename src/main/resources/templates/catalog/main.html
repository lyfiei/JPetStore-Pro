<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MyPetStore - Main</title>
    <link rel="StyleSheet" th:href="@{/css/mypetstore.css}" type="text/css" />
</head>
<body>

<div th:replace="~{common/top :: top}"></div>

<div id="Welcome">
    <div id="WelcomeContent">
<!--        <span th:if="${session.loginAccount != null}"-->
<!--              th:text="'Welcome ' + ${session.loginAccount.firstName} + '!'">-->
<!--            Welcome User!-->
<!--        </span>-->
    </div>
</div>

<div id="Main">
    <div id="Sidebar">
        <div id="SidebarContent">
            <a th:href="@{/catalog/category(categoryId='FISH')}">
                <img th:src="@{/images/fish_icon.gif}" />
            </a>
            <br /> Saltwater, Freshwater <br />

            <a th:href="@{/catalog/category(categoryId='DOGS')}"><img th:src="@{/images/dogs_icon.gif}" /></a><br />
            Various Breeds <br />

            <a th:href="@{/catalog/category(categoryId='CATS')}"><img th:src="@{/images/cats_icon.gif}" /></a><br />
            Various Breeds, Exotic Varieties <br />

            <a th:href="@{/catalog/category(categoryId='REPTILES')}"><img th:src="@{/images/reptiles_icon.gif}" /></a><br />
            Lizards, Turtles, Snakes <br />

            <a th:href="@{/catalog/category(categoryId='BIRDS')}"><img th:src="@{/images/birds_icon.gif}" /></a><br />
            Exotic Varieties
        </div>
    </div>
</div>

<div id="MainImage">
    <div id="MainImageContent">
        <map name="estoremap">
            <area alt="Birds" coords="72,2,280,250" th:href="@{/catalog/category(categoryId='BIRDS')}" shape="RECT" />
            <area alt="Fish" coords="2,180,72,250" th:href="@{/catalog/category(categoryId='FISH')}" shape="RECT" />
            <area alt="Dogs" coords="60,250,130,320" th:href="@{/catalog/category(categoryId='DOGS')}" shape="RECT" />
            <area alt="Reptiles" coords="140,270,210,340" th:href="@{/catalog/category(categoryId='REPTILES')}" shape="RECT" />
            <area alt="Cats" coords="225,240,295,310" th:href="@{/catalog/category(categoryId='CATS')}" shape="RECT" />
            <area alt="Birds" coords="280,180,350,250" th:href="@{/catalog/category(categoryId='BIRDS')}" shape="RECT" />
        </map>
        <img height="355" th:src="@{/images/splash.gif}" align="middle" usemap="#estoremap" width="350" />
    </div>
</div>

<div id="Separator">&nbsp;</div>

<div th:replace="~{common/bottom :: bottom}"></div>

</body>
</html>
