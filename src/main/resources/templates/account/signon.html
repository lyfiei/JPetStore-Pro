<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign On - JPetStore</title>
    <!-- 只引入 head 片段，不引入 div！！！ -->
    <div th:replace="common/top :: head"></div>
</head>
<body>

<!-- 正确：顶部导航放在 body 里面 -->
<div th:replace="common/top :: top"></div>

<div id="Catalog">
    <form action="signOn" method="post" id="loginForm">
        <p>Please enter your username and password.</p>
        <p id="messageBox"><font color="red" th:text="${signOnMsg}"></font></p>
        <p>
            Username: <input type="text" name="username" id="username"> <br />
            Password: <input type="password" name="password" id="password"/>
        </p>
        <input type="button" id="loginBtn" value="Login" >
    </form>

    <p>
        Need a username and password?
        <a th:href="@{/registerForm}">Register Now!</a>
    </p>

    <p>
        Or login with email verification code?
        <a th:href="@{/signOnCodeForm}">Login with code</a>
    </p>

    <div style="margin-top: 15px; border-top: 1px solid #e0e0e0; padding-top: 15px;">
        <p style="color: #888; font-size: 13px;">Or sign in with third-party account</p>
        <a href="/api/v1/auth/oauth/github/authorize"
           style="display: inline-flex; align-items: center; justify-content: center; gap: 8px;
                  width: 220px; padding: 10px 16px;
                  background: #24292e; color: #fff; text-decoration: none;
                  border-radius: 6px; font-size: 14px; font-weight: 500;">
            <svg style="width: 20px; height: 20px;" viewBox="0 0 19 19">
                <path fill="#fff" fill-rule="evenodd" d="M9.356 1.85C5.05 1.85 1.57 5.356 1.57 9.694a7.84 7.84 0 0 0 5.324 7.44c.387.079.528-.168.528-.376 0-.182-.013-.805-.013-1.454-2.165.467-2.616-.935-2.616-.935-.349-.91-.864-1.143-.864-1.143-.71-.48.051-.48.051-.48.787.051 1.2.805 1.2.805.695 1.194 1.817.857 2.268.649.064-.507.27-.857.49-1.052-1.728-.182-3.545-.857-3.545-3.87 0-.857.31-1.558.8-2.104-.078-.195-.349-1 .077-2.078 0 0 .657-.208 2.14.805a7.5 7.5 0 0 1 1.946-.26c.657 0 1.328.092 1.946.26 1.483-1.013 2.14-.805 2.14-.805.426 1.078.155 1.883.078 2.078.502.546.799 1.247.799 2.104 0 3.013-1.818 3.675-3.558 3.87.284.247.528.714.528 1.454 0 1.052-.012 1.896-.012 2.156 0 .208.142.455.528.377a7.84 7.84 0 0 0 5.324-7.441c.013-4.338-3.48-7.844-7.773-7.844" clip-rule="evenodd"/>
            </svg>
            Sign in with GitHub
        </a>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(function() {
        $("#loginBtn").click(function() {
            var username = $("#username").val();
            var password = $("#password").val();

            if(username === "" || password === "") {
                $("#messageBox").html("<font color='red'>用户名和密码不能为空</font>");
                return;
            }
            $("#loginForm").submit();
        });
    });
</script>

<!-- 底部 -->
<div th:replace="common/bottom :: bottom"></div>

</body>
</html>
